<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grazie! &#8212; Nozze di Nicola &amp; Anastasia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Lato',sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 20px; position:relative; overflow-x:hidden; background-color:#1e3a20; }
        .hero-bg { position:fixed; inset:0; background-image:url('https://upload.wikimedia.org/wikipedia/commons/thumb/e/e8/Bari_-_Basilica_di_San_Nicola.jpg/1280px-Bari_-_Basilica_di_San_Nicola.jpg'); background-size:cover; background-position:center 20%; animation:heroZoom 25s ease-in-out infinite alternate; z-index:0; }
        .hero-overlay { position:fixed; inset:0; background:linear-gradient(180deg,rgba(5,18,5,.55),rgba(8,30,8,.80)); z-index:1; }
        @keyframes heroZoom { from{transform:scale(1)} to{transform:scale(1.07)} }
        #petals { position:fixed; inset:0; pointer-events:none; z-index:2; overflow:hidden; }
        .petal { position:absolute; top:-30px; border-radius:50% 0 50% 0; opacity:0; animation:petalFall linear infinite; }
        @keyframes petalFall { 0%{top:-30px;opacity:.7;transform:rotate(0deg) translateX(0)} 30%{transform:rotate(120deg) translateX(40px)} 60%{opacity:.4;transform:rotate(240deg) translateX(-30px)} 100%{top:110vh;opacity:0;transform:rotate(400deg) translateX(20px)} }
        .container { position:relative; z-index:3; background:rgba(255,255,255,.97); border-radius:20px; padding:55px 48px; max-width:580px; width:100%; box-shadow:0 15px 60px rgba(0,0,0,.35); border-top:4px solid #c9a84c; animation:fadeUp .9s ease-out; text-align:center; }
        .success-icon { font-size:4.5rem; display:block; margin-bottom:18px; animation:popIn .6s cubic-bezier(.34,1.56,.64,1) .2s both; }
        @keyframes popIn { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
        .pre-title { font-family:'Great Vibes',cursive; font-size:1.9rem; color:#c9a84c; margin-bottom:6px; }
        h1 { font-family:'Playfair Display',serif; color:#1a4a1e; font-size:2.6rem; font-weight:400; letter-spacing:4px; margin-bottom:14px; }
        .divider { width:55px; height:1.5px; background:linear-gradient(90deg,transparent,#c9a84c,transparent); margin:0 auto 26px; }
        .message { font-family:'Playfair Display',serif; font-size:1.15rem; font-style:italic; color:#4a5e3a; line-height:1.85; margin-bottom:32px; }
        .reminder { background:linear-gradient(135deg,rgba(201,168,76,.07),rgba(46,125,50,.04)); border:1px solid rgba(201,168,76,.3); border-radius:14px; padding:26px 24px; margin-bottom:30px; text-align:left; }
        .reminder-row { display:flex; align-items:flex-start; gap:14px; padding:10px 0; border-bottom:1px solid rgba(201,168,76,.15); }
        .reminder-row:last-child { border-bottom:none; }
        .r-ico { font-size:1.3rem; flex-shrink:0; width:32px; text-align:center; padding-top:2px; }
        .r-body strong { display:block; font-size:.7rem; letter-spacing:2px; text-transform:uppercase; color:#6b8e23; margin-bottom:3px; }
        .r-body span, .r-body a { font-family:'Playfair Display',serif; font-size:1rem; color:#2d3a24; }
        .r-body a { color:#2e7d32; text-decoration:none; border-bottom:1px dashed rgba(46,125,50,.4); transition:all .3s; }
        .r-body a:hover { color:#c9a84c; border-bottom-color:#c9a84c; }
        .couple-sign { font-family:'Great Vibes',cursive; font-size:2rem; color:#c9a84c; display:block; margin-bottom:24px; }
        .back-link { display:inline-block; font-family:'Lato',sans-serif; font-size:.8rem; font-weight:700; letter-spacing:2.5px; text-transform:uppercase; color:#1a4a1e; text-decoration:none; padding:13px 30px; border:1.5px solid #2e7d32; border-radius:40px; transition:all .3s ease; }
        .back-link:hover { background:#2e7d32; color:#fff; box-shadow:0 6px 20px rgba(46,125,50,.28); transform:translateY(-2px); }
        @keyframes fadeUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:none} }
        @media(max-width:500px) { .container{padding:38px 22px} h1{font-size:2rem} }
    </style>
</head>
<body>
    <div class="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div id="petals"></div>
    <div class="container">
        <span class="success-icon">&#128140;</span>
        <p class="pre-title" data-i18n="grazie-pre">grazie mille!</p>
        <h1 data-i18n="grazie-h1">Grazie!</h1>
        <div class="divider"></div>
        <p class="message" data-i18n-html="grazie-msg">La tua conferma &egrave; stata ricevuta con successo.<br>Non vediamo l&apos;ora di festeggiare insieme a te!</p>
        <div class="reminder">
            <div class="reminder-row">
                <div class="r-ico">&#128197;</div>
                <div class="r-body"><strong data-i18n="reminder-data-lbl">Ti aspettiamo il</strong><span>24 Settembre 2026</span></div>
            </div>
            <div class="reminder-row">
                <div class="r-ico">&#9962;</div>
                <div class="r-body">
                    <strong data-i18n="reminder-cerimonia-lbl">Cerimonia</strong>
                    <a href="https://maps.app.goo.gl/Mmm5AadB6bUFoiXd8" target="_blank" rel="noopener">Basilica di San Nicola, Bari</a>
                    <span data-i18n="reminder-cerimonia-sfx"> — ore 10:30</span>
                </div>
            </div>
            <div class="reminder-row">
                <div class="r-ico">&#127869;</div>
                <div class="r-body">
                    <strong data-i18n="reminder-ricevimento-lbl">Ricevimento</strong>
                    <a href="https://maps.app.goo.gl/gyQPPhtSWLvdgnvj6" target="_blank" rel="noopener">Sala San Tommaso Ricevimenti</a>
                </div>
            </div>
        </div>
        <span class="couple-sign" data-i18n="couple-sign">Nicola &amp; Anastasia</span>
        <a href="index.html" class="back-link" data-i18n="grazie-back">← Torna alla Home</a>
    </div>
    <script>
        const colors = [['#f9c6d0','#e8869a'],['#fde2c8','#f5b98e'],['#e8f5d4','#b5d67a'],['#fce4ec','#f48fb1']];
        const pc = document.getElementById('petals');
        for (let i = 0; i < 28; i++) {
            const p = document.createElement('div');
            p.className = 'petal';
            const c = colors[i % colors.length];
            p.style.cssText = 'left:' + (Math.random()*100) + 'vw;width:' + (7+Math.random()*11) + 'px;height:' + (7+Math.random()*11) + 'px;background:radial-gradient(ellipse at 35% 35%,' + c[0] + ',' + c[1] + ');animation-duration:' + (8+Math.random()*10) + 's;animation-delay:' + (Math.random()*6) + 's';
            pc.appendChild(p);
        }
    </script>
    <script src="translations.js"></script>
</body>
</html>
