<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partecipa a realizzare i nostri sogni</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #f5f9f0 0%, #e8f0dc 100%);
            color: #2d3a24;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            border-radius: 15px;
            padding: 40px 30px;
            box-shadow: 0 5px 20px rgba(46, 125, 50, 0.1);
            border: 2px solid rgba(46, 125, 50, 0.2);
            border-top-width: 4px;
            border-top-color: #2e7d32;
            max-width: 500px;
            margin-top: 60px;
        }
        h1 {
            color: #2e7d32;
            text-align: center;
            margin-bottom: 25px;
            font-size: 2.2rem;
        }
        p {
            text-align: center;
            margin-bottom: 25px;
            font-size: 1.1rem;
        }
        .iban-box {
            background: #f5f9f0;
            border: 1px solid #b7d7b0;
            border-radius: 8px;
            padding: 18px 15px;
            margin-bottom: 18px;
            font-size: 1.05rem;
            word-break: break-all;
        }
        .iban-label {
            color: #2e7d32;
            font-weight: bold;
            margin-bottom: 5px;
            display: block;
        }
        a {
            color: #2e7d32;
            text-decoration: underline;
        }
        a:hover {
            color: #4caf50;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Partecipa a realizzare i nostri sogni</h1>
        <p>Se desideri contribuire al nostro viaggio insieme, puoi farlo tramite un regalo libero. Grazie di cuore per il tuo pensiero!</p>
        <div class="iban-box">
            <span class="iban-label">IBAN Nicola Losacco:</span>
            IT00A0000000000000000000000
        </div>
        <div class="iban-box">
            <span class="iban-label">IBAN Anastasia Khalizova:</span>
            IT11B1111111111111111111111
        </div>
        <p><a href="index.html">Torna alla pagina principale</a></p>
    </div>
</body>
</html>
