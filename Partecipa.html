<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partecipa &#8212; Nozze di Nicola &amp; Anastasiia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Lato',sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 20px; position:relative; overflow-x:hidden; background-color:#1e3a20; }
        .hero-bg { position:fixed; inset:0; background-image:url('https://upload.wikimedia.org/wikipedia/commons/thumb/e/e8/Bari_-_Basilica_di_San_Nicola.jpg/1280px-Bari_-_Basilica_di_San_Nicola.jpg'); background-size:cover; background-position:center 20%; animation:heroZoom 25s ease-in-out infinite alternate; z-index:0; }
        .hero-overlay { position:fixed; inset:0; background:linear-gradient(180deg,rgba(5,18,5,.55),rgba(8,30,8,.78)); z-index:1; }
        @keyframes heroZoom { from{transform:scale(1)} to{transform:scale(1.07)} }
        .container { position:relative; z-index:2; background:rgba(255,255,255,.97); border-radius:20px; padding:55px 48px; max-width:530px; width:100%; box-shadow:0 15px 60px rgba(0,0,0,.35); border-top:4px solid #c9a84c; animation:fadeUp .9s ease-out; text-align:center; }
        .pre-title { font-family:'Great Vibes',cursive; font-size:1.9rem; color:#c9a84c; margin-bottom:6px; }
        h1 { font-family:'Playfair Display',serif; color:#1a4a1e; font-size:1.9rem; font-weight:400; letter-spacing:2px; margin-bottom:22px; line-height:1.35; }
        .divider { width:50px; height:1.5px; background:linear-gradient(90deg,transparent,#c9a84c,transparent); margin:0 auto 28px; }
        p { color:#4a5e3a; font-size:1.05rem; line-height:1.85; margin-bottom:32px; }
        .iban-box { background:linear-gradient(135deg,rgba(201,168,76,.07),rgba(46,125,50,.04)); border:1px solid rgba(201,168,76,.38); border-radius:14px; padding:22px; margin-bottom:16px; text-align:left; transition:box-shadow .3s; }
        .iban-box:hover { box-shadow:0 6px 22px rgba(201,168,76,.2); }
        .iban-label { font-family:'Lato',sans-serif; font-weight:700; font-size:.7rem; letter-spacing:2.5px; text-transform:uppercase; color:#1a4a1e; display:block; margin-bottom:8px; }
        .iban-number { font-family:'Playfair Display',serif; font-size:1.02rem; color:#2d3a24; word-break:break-all; letter-spacing:1px; }
        .bic-row { display:flex; align-items:baseline; gap:10px; margin-top:10px; padding-top:10px; border-top:1px solid rgba(201,168,76,.2); }
        .bic-label { font-family:'Lato',sans-serif; font-weight:700; font-size:.65rem; letter-spacing:2px; text-transform:uppercase; color:#6b8e23; flex-shrink:0; }
        .bic-number { font-family:'Playfair Display',serif; font-size:.97rem; color:#2d3a24; letter-spacing:1px; }
        .back-link { display:inline-block; margin-top:32px; font-family:'Lato',sans-serif; font-size:.8rem; font-weight:700; letter-spacing:2.5px; text-transform:uppercase; color:#1a4a1e; text-decoration:none; padding:13px 30px; border:1.5px solid #2e7d32; border-radius:40px; transition:all .3s ease; }
        .back-link:hover { background:#2e7d32; color:#fff; box-shadow:0 6px 20px rgba(46,125,50,.28); transform:translateY(-2px); }
        @keyframes fadeUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:none} }
        @media(max-width:500px) { .container{padding:38px 22px} }
    </style>
</head>
<body>
    <div class="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="container">
        <p class="pre-title" data-i18n="partecipa-pre">con amore</p>
        <h1 data-i18n="partecipa-h1">Partecipa a realizzare i nostri sogni</h1>
        <div class="divider"></div>
        <p data-i18n-html="partecipa-p">Se desideri contribuire al nostro viaggio insieme, puoi farlo tramite un regalo libero.<br>Grazie di cuore per il tuo pensiero!</p>
        <div class="iban-box">
            <span class="iban-label" data-i18n="iban-lbl-nicola">IBAN &middot; Nicola Losacco</span>
            <span class="iban-number">IT25G0103004001000009100088</span>            
        </div>
        <div class="iban-box">
            <span class="iban-label" data-i18n="iban-lbl-Anastasiia">IBAN &middot; Anastasiia Khalizova</span>
            <span class="iban-number">IT80L3608105138294341594365</span>            
        </div>
        <a href="index.html" class="back-link" data-i18n="back-link">← Torna alla Home</a>
    </div>
</body>
<script src="translations.js"></script>
</html>
